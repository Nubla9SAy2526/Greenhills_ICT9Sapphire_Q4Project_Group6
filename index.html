<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body class="login-body">

    <div class="login-card">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135810.png" alt="Logo" class="portal-logo">
        <h1 class="login-title">Login</h1>
        
        <form id="loginForm" action="dashboard.html" method="GET">
            <div class="mb-4 text-center">
                <span class="input-label-badge">Username</span>
                <input type="text" class="form-control custom-input mt-1" placeholder="Enter here" required>
            </div>

            <div class="mb-4 text-center">
                <span class="input-label-badge">Password</span>
                <input type="password" class="form-control custom-input mt-1" placeholder="********" required>
            </div>

            <div class="text-start ps-4 mb-4">
                <div class="form-check form-switch d-inline-block">
                    <input class="form-check-input" type="checkbox" id="stayLoggedIn" checked>
                    <label class="form-check-label fw-bold text-secondary small" for="stayLoggedIn">Stay logged in</label>
                </div>
                <div class="text-muted small session-notice ps-1">Your session will stay active on this device.</div>
            </div>

            <div class="mb-4">
                <button type="submit" class="btn btn-login shadow-sm">Login</button>
                <button type="button" class="btn btn-cancel">Cancel</button>
            </div>

            <hr class="my-4" style="border-color: #ccc;">
            <a href="#" class="forgot-link">Forgot username / password?</a>
        </form>
    </div>

    <div class="footer-strip"></div>

    <script src="main.js"></script>
</body>
</html>
